<style>
  :root {
    --gold: #C8A96E;
    --gold-light: #E8D5AA;
    --dark: #0D0D0D;
    --dark2: #161616;
    --dark3: #1F1F1F;
    --dark4: #252525;
    --border: rgba(200,169,110,0.2);
    --text: #E8E8E0;
    --muted: #888880;
    --blue: #4A90D9;
    --green: #4CAF82;
    --purple: #9B7FD4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark); color: var(--text);
    font-family: 'DM Sans', sans-serif; min-height: 100vh;
    padding: 40px 20px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(200,169,110,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 90%, rgba(200,169,110,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }

  /* Botão voltar */
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--dark2); color: var(--gold);
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    text-decoration: none; padding: 9px 18px;
    border-radius: 8px; border: 1px solid rgba(200,169,110,0.3);
    letter-spacing: 0.04em; margin-bottom: 40px;
    transition: all 0.2s; display: inline-flex;
  }
  .back-btn:hover { background: var(--dark3); border-color: rgba(200,169,110,0.7); }
  .back-btn svg { width: 14px; height: 14px; }

  /* Header */
  header { text-align: center; margin-bottom: 48px; }
  .logo-line { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 10px; }
  .logo-line::before, .logo-line::after { content: ''; flex: 1; max-width: 80px; height: 1px; background: linear-gradient(to right, transparent, var(--gold)); }
  .logo-line::after { background: linear-gradient(to left, transparent, var(--gold)); }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px, 5vw, 50px); letter-spacing: 0.08em; color: var(--gold); line-height: 1; }
  .subtitle { font-size: 12px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 8px; }

  /* Busca */
  .search-wrap { position: relative; margin-bottom: 36px; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }
  .search-wrap input {
    width: 100%; padding: 13px 14px 13px 42px;
    background: var(--dark2); border: 1px solid rgba(200,169,110,0.2);
    border-radius: 10px; color: var(--text); font-size: 14px;
    font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: rgba(200,169,110,0.55); }
  .search-results {
    position: absolute; left: 0; right: 0; top: calc(100% + 6px);
    background: var(--dark3); border: 1px solid rgba(200,169,110,0.25);
    border-radius: 10px; overflow: hidden; display: none;
    max-height: 280px; overflow-y: auto; z-index: 100;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  }
  .search-results.show { display: block; }
  .search-item {
    display: flex; align-items: center; gap: 10px; padding: 11px 16px;
    text-decoration: none; color: var(--text); transition: background 0.15s;
    border-bottom: 1px solid rgba(200,169,110,0.07);
  }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: rgba(200,169,110,0.08); }
  .search-item-cat { font-size: 10px; color: var(--muted); background: var(--dark4); padding: 2px 8px; border-radius: 4px; flex-shrink: 0; white-space: nowrap; }
  .search-item-name { font-size: 13px; flex: 1; }

  /* Seções */
  .link-section { margin-bottom: 36px; }
  .link-section-title {
    font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(200,169,110,0.12);
    display: flex; align-items: center; gap: 8px;
  }
  .link-section-title span { font-size: 16px; }

  .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 8px; }

  .link-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 14px; background: var(--dark2);
    border: 1px solid rgba(200,169,110,0.08); border-radius: 10px;
    text-decoration: none; color: var(--text); font-size: 12px; font-weight: 500;
    transition: all 0.2s; line-height: 1.4;
  }
  .link-item:hover { border-color: rgba(200,169,110,0.45); background: rgba(200,169,110,0.06); color: var(--gold-light); transform: translateY(-1px); }
  .link-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .dot-bi { background: var(--blue); }
  .dot-site { background: var(--green); }
  .dot-intra { background: var(--purple); }

  footer { text-align: center; margin-top: 52px; font-size: 11px; color: rgba(136,136,128,0.4); letter-spacing: 0.1em; }
</style>
</head>

const ALL_LINKS = [
  ...LINKS.bi.map(l => ({ ...l, cat: 'Power BI', dot: 'dot-bi' })),
  ...LINKS.sites.map(l => ({ ...l, cat: 'Sites', dot: 'dot-site' })),
  ...LINKS.intra.map(l => ({ ...l, cat: 'Intranet', dot: 'dot-intra' })),
];

function mkLink(l, dot) {
  return `<a class="link-item" href="${l.u}" target="_blank" rel="noopener"><span class="link-dot ${dot}"></span>${l.n}</a>`;
}

function renderLinks() {
  document.getElementById('grid-bi').innerHTML    = LINKS.bi.map(l => mkLink(l,'dot-bi')).join('');
  document.getElementById('grid-sites').innerHTML = LINKS.sites.map(l => mkLink(l,'dot-site')).join('');
  document.getElementById('grid-intra').innerHTML = LINKS.intra.map(l => mkLink(l,'dot-intra')).join('');
}

function buscarLinks(q) {
  const box = document.getElementById('search-results');
  if (!q.trim()) { box.classList.remove('show'); return; }
  const term = q.toLowerCase();
  const res = ALL_LINKS.filter(l => l.n.toLowerCase().includes(term)).slice(0, 8);
  if (!res.length) { box.classList.remove('show'); return; }
  box.innerHTML = res.map(l =>
    `<a class="search-item" href="${l.u}" target="_blank" rel="noopener">
      <span class="search-item-cat">${l.cat}</span>
      <span class="search-item-name">${l.n}</span>
    </a>`
  ).join('');
  box.classList.add('show');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap'))
    document.getElementById('search-results').classList.remove('show');
});

renderLinks();
</script>
