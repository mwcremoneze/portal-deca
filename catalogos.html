<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogos – Portal DECA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8A96E;
    --gold-light: #E8D5AA;
    --dark: #0D0D0D;
    --dark2: #161616;
    --dark3: #1F1F1F;
    --dark4: #252525;
    --border: rgba(200,169,110,0.2);
    --text: #E8E8E0;
    --muted: #888880;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark); color: var(--text);
    font-family: 'DM Sans', sans-serif; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(200,169,110,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 90%, rgba(200,169,110,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ── TOP NAV ── */
  .topnav {
    position: sticky; top: 0; z-index: 100;
    width: 100%; background: rgba(13,13,13,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px; gap: 16px;
  }
  .nav-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 0.1em; color: var(--gold);
    flex-shrink: 0;
  }
  .nav-btns { display: flex; gap: 10px; }
  .nav-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    letter-spacing: 0.05em; text-decoration: none; border: 1px solid;
    transition: all 0.2s;
  }
  .nav-btn-home {
    color: var(--gold); border-color: rgba(200,169,110,0.3);
    background: rgba(200,169,110,0.08);
  }
  .nav-btn-home:hover { background: rgba(200,169,110,0.18); border-color: var(--gold); }
  .nav-btn-back {
    color: var(--muted); border-color: rgba(136,136,128,0.2);
    background: transparent;
  }
  .nav-btn-back:hover { color: var(--text); border-color: rgba(136,136,128,0.5); background: rgba(136,136,128,0.08); }

  /* ── WRAPPER ── */
  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 960px; padding: 0 20px 60px; }

  /* ── SCREEN: SELECTION ── */
  #screen-select {
    padding-top: 52px;
  }
  .sel-header { text-align: center; margin-bottom: 44px; }
  .sel-header h2 {
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px,5vw,52px);
    letter-spacing: 0.08em; color: var(--gold); line-height: 1;
  }
  .sel-header p { font-size: 13px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 8px; }

  .cat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; }
  .cat-card {
    background: var(--dark2); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 24px; cursor: pointer;
    transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    position: relative; overflow: hidden; text-decoration: none;
    display: flex; flex-direction: column; align-items: flex-start; gap: 12px;
  }
  .cat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .cat-card:hover { border-color: rgba(200,169,110,0.5); transform: translateY(-3px); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .cat-card:hover::before { opacity: 1; }
  .cat-icon { font-size: 32px; line-height: 1; display: flex; align-items: center; }
  .cat-name {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    letter-spacing: 0.06em; color: var(--gold-light); line-height: 1.1;
  }
  .cat-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .cat-arrow {
    margin-top: auto; align-self: flex-end;
    width: 32px; height: 32px; background: rgba(200,169,110,0.12);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .cat-card:hover .cat-arrow { background: rgba(200,169,110,0.28); }

  /* ── SCREEN: VIEWER ── */
  #screen-viewer { display: none; padding-top: 32px; }

  .viewer-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; gap: 12px; flex-wrap: wrap;
  }
  .viewer-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px;
    letter-spacing: 0.06em; color: var(--gold);
  }
  .page-counter {
    font-size: 13px; color: var(--muted); letter-spacing: 0.08em;
    background: var(--dark3); padding: 6px 14px; border-radius: 8px;
    border: 1px solid var(--border);
  }
  .page-counter span { color: var(--gold-light); font-weight: 500; }

  /* ── PDF FLIPBOOK CONTAINER ── */
  .flipbook-wrap {
    position: relative;
    width: 100%;
    height: 75vh;
    min-height: 400px;
    background: var(--dark2); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }
  .page-stage {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: auto; border-radius: 16px;
  }

  /* Slide animation layers */
  .page-current, .page-next {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--dark2);
  }
  .page-current canvas, .page-next canvas {
    max-width: 100%; max-height: 100%;
    display: block; object-fit: contain;
  }
  .page-next { transform: translateX(100%); }

  /* Flip animation classes */
  .flip-left .page-current  { animation: slideOutLeft  0.38s cubic-bezier(.4,0,.2,1) forwards; }
  .flip-left .page-next     { animation: slideInLeft   0.38s cubic-bezier(.4,0,.2,1) forwards; }
  .flip-right .page-current { animation: slideOutRight 0.38s cubic-bezier(.4,0,.2,1) forwards; }
  .flip-right .page-next    { animation: slideInRight  0.38s cubic-bezier(.4,0,.2,1) forwards; }

  @keyframes slideOutLeft  { to { transform: translateX(-100%); } }
  @keyframes slideInLeft   { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes slideOutRight { to { transform: translateX(100%); } }
  @keyframes slideInRight  { from { transform: translateX(-100%); } to { transform: translateX(0); } }

  /* Loading overlay */
  .page-loading {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; background: var(--dark2); border-radius: 16px; z-index: 10;
    transition: opacity 0.3s;
  }
  .page-loading.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid rgba(200,169,110,0.15);
    border-top-color: var(--gold); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--muted); letter-spacing: 0.1em; }

  /* ── BOTTOM CONTROLS ── */
  .flipbook-controls {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; margin-top: 16px; flex-wrap: wrap;
  }
  .ctrl-btn {
    background: var(--dark2); border: 1px solid var(--border);
    border-radius: 10px; width: 46px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; color: var(--gold);
  }
  .ctrl-btn:hover:not(:disabled) { background: rgba(200,169,110,0.12); border-color: rgba(200,169,110,0.5); transform: scale(1.05); }
  .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .ctrl-btn svg { width: 18px; height: 18px; }
  .ctrl-first, .ctrl-last {
    width: 38px; height: 38px; border-radius: 8px;
    background: transparent; border: 1px solid rgba(200,169,110,0.15);
    font-size: 11px; letter-spacing: 0.05em; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .ctrl-first:hover:not(:disabled), .ctrl-last:hover:not(:disabled) { color: var(--gold); border-color: rgba(200,169,110,0.4); }
  .ctrl-first:disabled, .ctrl-last:disabled { opacity: 0.3; cursor: not-allowed; }
  .ctrl-sep { width: 1px; height: 28px; background: var(--border); }

  /* tool buttons (magnifier, fullscreen) */
  .tool-btn {
    background: var(--dark2); border: 1px solid var(--border);
    border-radius: 8px; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; color: var(--muted); flex-shrink: 0;
  }
  .tool-btn:hover { color: var(--gold); border-color: rgba(200,169,110,0.4); background: rgba(200,169,110,0.07); }
  .tool-btn.active { color: var(--gold); border-color: rgba(200,169,110,0.5); background: rgba(200,169,110,0.12); }
  .tool-btn svg { width: 16px; height: 16px; }

  /* zoom pill */
  .zoom-pill {
    display: flex; align-items: center; gap: 4px;
    background: var(--dark3); border: 1px solid var(--border);
    border-radius: 8px; padding: 0 4px; height: 38px;
  }
  .zoom-pill button {
    background: none; border: none; color: var(--gold); cursor: pointer;
    font-size: 18px; width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; line-height: 1; user-select: none;
  }
  .zoom-pill button:hover { background: rgba(200,169,110,0.15); }
  .zoom-pill button:disabled { opacity: 0.3; cursor: not-allowed; }
  .zoom-val {
    min-width: 46px; text-align: center; font-size: 12px; font-weight: 500;
    color: var(--gold-light); letter-spacing: 0.04em; cursor: pointer;
  }
  .zoom-val:hover { color: var(--gold); }

  /* Click zones on flipbook */
  .click-prev, .click-next {
    position: absolute; top: 0; bottom: 0; width: 14%;
    z-index: 20; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .click-prev { left: 0; }
  .click-next { right: 0; }
  .flipbook-wrap:hover .click-prev,
  .flipbook-wrap:hover .click-next { opacity: 1; }
  .click-prev svg, .click-next svg {
    width: 38px; height: 38px; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.9));
    color: var(--gold);
  }

  /* Magnifier lens */
  #magnifier {
    position: absolute; border-radius: 50%;
    width: 160px; height: 160px;
    border: 2.5px solid var(--gold);
    box-shadow: 0 4px 32px rgba(0,0,0,0.7), 0 0 0 1px rgba(200,169,110,0.3);
    pointer-events: none; display: none; z-index: 50;
    overflow: hidden; background: var(--dark);
  }
  #magnifier canvas { position: absolute; top: 0; left: 0; }
  .mag-crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 12px; height: 12px; pointer-events: none; z-index: 51;
  }
  .mag-crosshair::before, .mag-crosshair::after {
    content: ''; position: absolute; background: rgba(200,169,110,0.6);
  }
  .mag-crosshair::before { width: 1px; height: 12px; left: 5.5px; top: 0; }
  .mag-crosshair::after  { width: 12px; height: 1px; top: 5.5px; left: 0; }

  /* Fullscreen overlay */
  #fullscreen-overlay {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: #000; flex-direction: column; align-items: center; justify-content: center;
  }
  #fullscreen-overlay.open { display: flex; }
  #fs-canvas-wrap {
    flex: 1; width: 100%; display: flex; align-items: center; justify-content: center;
    overflow: auto; padding: 8px;
  }
  #fs-canvas-wrap canvas { max-width: 100%; max-height: 100%; display: block; }
  #fs-bar {
    width: 100%; display: flex; align-items: center; justify-content: center;
    gap: 12px; padding: 12px 20px; background: rgba(0,0,0,0.85);
    border-top: 1px solid rgba(200,169,110,0.15); flex-shrink: 0;
  }
  .fs-btn {
    background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.25);
    border-radius: 10px; width: 46px; height: 46px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold); transition: all 0.2s;
  }
  .fs-btn:hover:not(:disabled) { background: rgba(200,169,110,0.2); border-color: var(--gold); }
  .fs-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .fs-btn svg { width: 20px; height: 20px; }
  .fs-counter {
    font-size: 13px; color: var(--gold-light); letter-spacing: 0.08em;
    background: rgba(200,169,110,0.08); border: 1px solid rgba(200,169,110,0.2);
    border-radius: 8px; padding: 8px 16px;
  }
  .fs-counter span { color: var(--gold); font-weight: 500; }
  #fs-close {
    position: absolute; top: 14px; right: 18px;
    background: rgba(200,169,110,0.1); border: 1px solid rgba(200,169,110,0.25);
    border-radius: 8px; width: 36px; height: 36px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold); font-size: 18px; transition: all 0.2s; z-index: 10000;
  }
  #fs-close:hover { background: rgba(200,169,110,0.25); }

  /* hint */
  .swipe-hint {
    text-align: center; margin-top: 8px;
    font-size: 11px; color: rgba(136,136,128,0.35); letter-spacing: 0.08em;
  }
</head>
<body>

<!-- TOP NAVIGATION -->
<nav class="topnav">
  <div class="nav-brand">📋 CATÁLOGOS DECA</div>
  <div class="nav-btns">
    <a href="index.html" class="nav-btn nav-btn-home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Início
    </a>
    <button onclick="voltarSelecao()" id="btn-back" class="nav-btn nav-btn-back" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Catálogos
    </button>
  </div>
</nav>

<div class="wrapper">

  <!-- SCREEN 1: CATALOG SELECTION -->
  <div id="screen-select">
    <div class="sel-header">
      <h2>Catálogos</h2>
      <p>Selecione o catálogo para visualizar</p>
    </div>

    <div class="cat-grid">
      <!-- LOUÇAS — bacia sanitária branca, vista de lateral -->
      <div class="cat-card" onclick="abrirCatalogo(0)">
        <div class="cat-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bowl-body" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#f0f0f0"/>
                <stop offset="40%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#d8d8d8"/>
              </linearGradient>
              <linearGradient id="tank-body" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#e8e8e8"/>
                <stop offset="50%" stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#d0d0d0"/>
              </linearGradient>
              <linearGradient id="base-grad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#e0e0e0"/>
                <stop offset="100%" stop-color="#c8c8c8"/>
              </linearGradient>
            </defs>
            <!-- Caixa acoplada (cisterna) -->
            <rect x="8" y="6" width="22" height="16" rx="3" fill="url(#tank-body)" stroke="#b0b0b0" stroke-width="1"/>
            <!-- Tampa da caixa -->
            <rect x="7" y="4" width="24" height="4" rx="2" fill="#e4e4e4" stroke="#b8b8b8" stroke-width="0.8"/>
            <!-- Botão flush -->
            <rect x="16" y="5.5" width="6" height="2" rx="1" fill="#cccccc" stroke="#aaaaaa" stroke-width="0.5"/>
            <!-- Conexão caixa-vaso -->
            <rect x="14" y="21" width="8" height="5" rx="1" fill="#d8d8d8" stroke="#b0b0b0" stroke-width="0.8"/>
            <!-- Vaso — silhueta lateral realista -->
            <path d="M10 26 L10 30 Q10 48 28 50 Q40 51 44 46 Q50 40 48 32 Q47 28 42 27 L10 26 Z"
                  fill="url(#bowl-body)" stroke="#b0b0b0" stroke-width="1"/>
            <!-- Sombra interna do vaso -->
            <path d="M20 28 Q26 29 38 30 Q46 32 47 37" fill="none" stroke="#d0d0d0" stroke-width="0.8" opacity="0.8"/>
            <!-- Aro do assento (tampa) -->
            <path d="M10 26 Q10 23 20 22 Q32 21 42 24 Q47 25.5 42 27 L10 26 Z"
                  fill="#eeeeee" stroke="#bbbbbb" stroke-width="0.8"/>
            <!-- Base / pedestal -->
            <path d="M22 50 Q22 56 20 58 L36 58 Q34 56 34 50 Z"
                  fill="url(#base-grad)" stroke="#b0b0b0" stroke-width="0.8"/>
            <!-- Pé da base -->
            <rect x="17" y="57" width="22" height="3" rx="1.5" fill="#c8c8c8" stroke="#b0b0b0" stroke-width="0.8"/>
            <!-- Reflexo de luz no vaso -->
            <path d="M14 29 Q16 35 15 42" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="cat-name">Louças</div>
        <div class="cat-desc">Portfólio completo de louças sanitárias Deca.</div>
        <div class="cat-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C8A96E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>

      <!-- METAIS — torneira cromada -->
      <div class="cat-card" onclick="abrirCatalogo(1)">
        <div class="cat-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="chrome-body" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="#888"/>
                <stop offset="20%"  stop-color="#e0e0e0"/>
                <stop offset="50%"  stop-color="#ffffff"/>
                <stop offset="75%"  stop-color="#c8c8c8"/>
                <stop offset="100%" stop-color="#909090"/>
              </linearGradient>
              <linearGradient id="chrome-neck" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%"   stop-color="#999"/>
                <stop offset="30%"  stop-color="#f0f0f0"/>
                <stop offset="70%"  stop-color="#e0e0e0"/>
                <stop offset="100%" stop-color="#aaaaaa"/>
              </linearGradient>
              <linearGradient id="chrome-base" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#d8d8d8"/>
                <stop offset="50%"  stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#b0b0b0"/>
              </linearGradient>
              <linearGradient id="lever-chrome" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#e8e8e8"/>
                <stop offset="50%"  stop-color="#ffffff"/>
                <stop offset="100%" stop-color="#c0c0c0"/>
              </linearGradient>
            </defs>
            <!-- Bancada -->
            <rect x="4" y="53" width="56" height="5" rx="2" fill="#d0d0d0" stroke="#b0b0b0" stroke-width="0.8"/>
            <!-- Corpo principal (coluna) -->
            <rect x="27" y="33" width="10" height="21" rx="4" fill="url(#chrome-body)" stroke="#999" stroke-width="0.7"/>
            <!-- Bico curvo — tubo externo -->
            <path d="M32 33 Q32 16 50 14" fill="none" stroke="url(#chrome-neck)" stroke-width="7" stroke-linecap="round"/>
            <!-- Bico curvo — realce interno -->
            <path d="M32 33 Q32 16 50 14" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Ponta do bico (arejador) -->
            <rect x="46" y="11" width="8" height="7" rx="3" fill="url(#chrome-base)" stroke="#aaaaaa" stroke-width="0.8"/>
            <!-- Gotas d'água -->
            <ellipse cx="50" cy="22" rx="1.5" ry="2.5" fill="#9ec8e8" opacity="0.85"/>
            <ellipse cx="48" cy="28" rx="1.2" ry="2" fill="#9ec8e8" opacity="0.55"/>
            <!-- Base da coluna (anel) -->
            <rect x="24" y="50" width="16" height="4" rx="2" fill="url(#chrome-base)" stroke="#aaaaaa" stroke-width="0.7"/>
            <!-- Alavanca monocomando — haste -->
            <rect x="22" y="27" width="20" height="7" rx="3.5" fill="url(#lever-chrome)" stroke="#aaaaaa" stroke-width="0.7"/>
            <!-- Alavanca — botão superior -->
            <rect x="29" y="20" width="6" height="10" rx="3" fill="url(#lever-chrome)" stroke="#aaaaaa" stroke-width="0.7"/>
            <!-- Reflexo brilho na alavanca -->
            <rect x="30" y="21" width="2" height="5" rx="1" fill="rgba(255,255,255,0.8)"/>
            <!-- Reflexo no corpo -->
            <rect x="29" y="35" width="2" height="14" rx="1" fill="rgba(255,255,255,0.6)"/>
          </svg>
        </div>
        <div class="cat-name">Metais</div>
        <div class="cat-desc">Linha completa de metais sanitários e torneiras.</div>
        <div class="cat-arrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C8A96E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>

    </button>
    <button class="fs-btn" id="fs-last"  onclick="fsNavPage(999)"  title="Última">⏭</button>

<!-- PDF.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const CATALOGS = [
  { title: 'Catálogo Louças',              file: 'catalogo_louca.pdf'              },
  { title: 'Catálogo Metais',              file: 'catalogo_metal.pdf'              },
  { title: 'Catálogo Metais DCOUT',        file: 'catalogo_metal_dcout.pdf'         },
  { title: 'Catálogo Básicos Industriais', file: 'catalogo_basicos_industriais.pdf' },
];

let pdfDoc       = null;
let currentPage  = 1;
let totalPages   = 0;
let isAnimating  = false;
let activeCanvas = 'a';
let zoomLevel    = 1.0;
let magActive    = false;

// Render at DPR × RENDER_BOOST for maximum sharpness
const DPR          = Math.min(window.devicePixelRatio || 1, 3);
const RENDER_BOOST = 2.5;
const ZOOM_MIN     = 0.5;
const ZOOM_MAX     = 4.0;
const ZOOM_STEP    = 0.25;
const MAG_ZOOM     = 3.5;
const MAG_R        = 80;

// ── Touch / swipe / pinch
let touchStartX    = 0;
let pinchStartDist = 0;
let isPinching     = false;

const wrap = document.getElementById('flipbook-wrap');

wrap.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    isPinching = true;
    pinchStartDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY);
  } else { touchStartX = e.touches[0].clientX; isPinching = false; }
}, { passive: true });

wrap.addEventListener('touchmove', e => {
  if (!isPinching || e.touches.length < 2) return;
  const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                       e.touches[0].clientY - e.touches[1].clientY);
  if (Math.abs(d - pinchStartDist) > 12) {
    setZoom(zoomLevel + (d > pinchStartDist ? ZOOM_STEP : -ZOOM_STEP));
    pinchStartDist = d;
  }
}, { passive: true });

wrap.addEventListener('touchend', e => {
  if (isPinching) { isPinching = false; return; }
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navPage(dx < 0 ? 1 : -1);
}, { passive: true });

// Ctrl+Scroll zoom
wrap.addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    setZoom(zoomLevel + (e.deltaY < 0 ? ZOOM_STEP : -ZOOM_STEP));
  }
}, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
  const fsOpen = document.getElementById('fullscreen-overlay').classList.contains('open');
  const vOpen  = document.getElementById('screen-viewer').style.display !== 'none';
  if (e.key === 'Escape' && fsOpen) { closeFullscreen(); return; }
  if (fsOpen) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') fsNavPage(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   fsNavPage(-1);
    return;
  }
  if (!vOpen) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navPage(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navPage(-1);
  if ((e.ctrlKey||e.metaKey) && (e.key==='+'||e.key==='=')) { e.preventDefault(); changeZoom(+ZOOM_STEP); }
  if ((e.ctrlKey||e.metaKey) && e.key==='-')                { e.preventDefault(); changeZoom(-ZOOM_STEP); }
  if ((e.ctrlKey||e.metaKey) && e.key==='0')                { e.preventDefault(); resetZoom(); }
  if (e.key === 'f' || e.key === 'F') openFullscreen();
});

// ── Magnifier
const magEl  = document.getElementById('magnifier');
const magCvs = document.getElementById('mag-canvas');
const magCtx = magCvs.getContext('2d');
magCvs.width  = MAG_R * 2;
magCvs.height = MAG_R * 2;

wrap.addEventListener('mousemove', e => {
  if (!magActive || !pdfDoc) return;
  const rect = wrap.getBoundingClientRect();
  const mx   = e.clientX - rect.left;
  const my   = e.clientY - rect.top;
  const lx   = Math.max(MAG_R, Math.min(rect.width  - MAG_R, mx));
  const ly   = Math.max(MAG_R, Math.min(rect.height - MAG_R, my));
  magEl.style.left = (lx - MAG_R) + 'px';
  magEl.style.top  = (ly - MAG_R) + 'px';
  const srcCanvas = document.getElementById(activeCanvas === 'a' ? 'canvas-a' : 'canvas-b');
  if (!srcCanvas || !srcCanvas.width) return;
  const cvRect = srcCanvas.getBoundingClientRect();
  const cx = (e.clientX - cvRect.left)  * (srcCanvas.width  / cvRect.width);
  const cy = (e.clientY - cvRect.top)   * (srcCanvas.height / cvRect.height);
  const srcR = MAG_R / MAG_ZOOM;
  magCtx.clearRect(0, 0, MAG_R*2, MAG_R*2);
  magCtx.save();
  magCtx.beginPath();
  magCtx.arc(MAG_R, MAG_R, MAG_R, 0, Math.PI*2);
  magCtx.clip();
  magCtx.imageSmoothingEnabled = true;
  magCtx.imageSmoothingQuality = 'high';
  magCtx.drawImage(srcCanvas, cx - srcR, cy - srcR, srcR*2, srcR*2, 0, 0, MAG_R*2, MAG_R*2);
  magCtx.restore();
});

wrap.addEventListener('mouseenter', () => { if (magActive) magEl.style.display = 'block'; });
wrap.addEventListener('mouseleave', () => { magEl.style.display = 'none'; });

function toggleMag() {
  magActive = !magActive;
  document.getElementById('btn-mag').classList.toggle('active', magActive);
  wrap.style.cursor = magActive ? 'none' : '';
  if (!magActive) magEl.style.display = 'none';
}

// ── Catalog open / close
function abrirCatalogo(idx) {
  document.getElementById('screen-select').style.display = 'none';
  document.getElementById('screen-viewer').style.display = 'block';
  document.getElementById('btn-back').style.display = 'flex';
  document.getElementById('viewer-title').textContent = CATALOGS[idx].title;
  zoomLevel = 1.0; updateZoomDisplay();
  loadPDF(CATALOGS[idx].file);
}

function voltarSelecao() {
  document.getElementById('screen-viewer').style.display = 'none';
  document.getElementById('screen-select').style.display = 'block';
  document.getElementById('btn-back').style.display = 'none';
  pdfDoc = null; currentPage = 1; totalPages = 0;
  zoomLevel = 1.0; updateZoomDisplay();
  if (magActive) toggleMag();
}

// ── Zoom
function setZoom(val) {
  zoomLevel = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, Math.round(val * 100) / 100));
  updateZoomDisplay();
  if (pdfDoc) renderPage(currentPage, 'none');
}
function changeZoom(d) { setZoom(zoomLevel + d); }
function resetZoom()   { setZoom(1.0); }
function updateZoomDisplay() {
  const pct = Math.round(zoomLevel * 100);
  document.getElementById('zoom-display').textContent = pct + '%';
  const zo = document.getElementById('btn-zoom-out');
  const zi = document.getElementById('btn-zoom-in');
  if (zo) zo.disabled = zoomLevel <= ZOOM_MIN;
  if (zi) zi.disabled = zoomLevel >= ZOOM_MAX;
}

// ── PDF load
function loadPDF(filename) {
  const loadEl = document.getElementById('page-loading');
  loadEl.classList.remove('hidden');
  loadEl.style.opacity = '1';
  loadEl.style.pointerEvents = 'auto';
  loadEl.innerHTML = '<div class="spinner"></div><div class="loading-text">Carregando catálogo...</div>';

  currentPage = 1;

  // Use cMapUrl for better font rendering (important for PDFs with special chars)
  const loadingTask = pdfjsLib.getDocument({
    url: filename,
    cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
    cMapPacked: true,
    enableXfa: false,
  });

  loadingTask.onProgress = function(data) {
    if (data.total > 0) {
      const pct = Math.round((data.loaded / data.total) * 100);
      const txt = loadEl.querySelector('.loading-text');
      if (txt) txt.textContent = 'Carregando... ' + pct + '%';
    }
  };

  loadingTask.promise.then(doc => {
    pdfDoc = doc;
    totalPages = doc.numPages;
    document.getElementById('tot-pages').textContent = totalPages;
    document.getElementById('fs-tot').textContent    = totalPages;
    renderPage(currentPage, 'none');
  }).catch(err => {
    console.error('PDF load error:', err);
    loadEl.innerHTML =
      '<div style="text-align:center;padding:24px;max-width:320px">' +
      '<div style="font-size:36px;margin-bottom:12px">⚠️</div>' +
      '<div style="color:#e07050;font-size:14px;font-weight:500;margin-bottom:10px">Não foi possível carregar o PDF</div>' +
      '<div style="color:var(--muted);font-size:12px;line-height:1.6;margin-bottom:14px">' +
      'Verifique se o arquivo <strong style="color:var(--text)">' + filename + '</strong><br>' +
      'está na mesma pasta que o <strong style="color:var(--text)">catalogos.html</strong>' +
      '</div>' +
      '<div style="color:rgba(136,136,128,0.5);font-size:11px;font-family:monospace;background:rgba(0,0,0,0.3);padding:8px 12px;border-radius:6px">' + (err.message || String(err)) + '</div>' +
      '</div>';
  });
}

// ── Canvas helpers
function getCanvasId(w) { return w === 'a' ? 'canvas-a' : 'canvas-b'; }
function getLayerId(w)  { return w === 'a' ? 'layer-current' : 'layer-next'; }
function getOther(w)    { return w === 'a' ? 'b' : 'a'; }

// ── HIGH-QUALITY render
// Canvas physical px = CSS px × DPR × RENDER_BOOST  →  maximum sharpness
// canvas.style.width/height = CSS px  →  correct display size
function renderPage(pageNum, direction) {
  if (!pdfDoc) return;
  pdfDoc.getPage(pageNum).then(page => {
    const wrapEl   = document.getElementById('flipbook-wrap');
    const nativeVp = page.getViewport({ scale: 1 });

    // Base: fit page inside container
    const baseScale = Math.min(
      wrapEl.clientWidth  / nativeVp.width,
      wrapEl.clientHeight / nativeVp.height
    ) * 0.96;

    const cssW = nativeVp.width  * baseScale * zoomLevel;
    const cssH = nativeVp.height * baseScale * zoomLevel;

    // Physical render scale (much larger than CSS size → crisp on any screen)
    const renderScale = baseScale * zoomLevel * DPR * RENDER_BOOST;
    const viewport    = page.getViewport({ scale: renderScale });

    const targetId = direction === 'none' ? getCanvasId(activeCanvas) : getCanvasId(getOther(activeCanvas));
    const canvas   = document.getElementById(targetId);
    const ctx      = canvas.getContext('2d', { alpha: false });

    canvas.width         = viewport.width;
    canvas.height        = viewport.height;
    canvas.style.width   = cssW + 'px';
    canvas.style.height  = cssH + 'px';
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    page.render({ canvasContext: ctx, viewport, intent: 'display' }).promise.then(() => {
      document.getElementById('page-loading').classList.add('hidden');
      updateCounter(pageNum);
      updateButtons(pageNum);

      if (direction === 'none') {
        const curLayer  = document.getElementById('layer-current');
        const nextLayer = document.getElementById('layer-next');
        curLayer.innerHTML  = '<canvas id="canvas-a"></canvas>';
        nextLayer.innerHTML = '<canvas id="canvas-b"></canvas>';
        const fresh = document.getElementById(getCanvasId(activeCanvas));
        fresh.width        = viewport.width;
        fresh.height       = viewport.height;
        fresh.style.width  = cssW + 'px';
        fresh.style.height = cssH + 'px';
        const fCtx = fresh.getContext('2d', { alpha: false });
        fCtx.imageSmoothingEnabled = true;
        fCtx.imageSmoothingQuality = 'high';
        page.render({ canvasContext: fCtx, viewport, intent: 'display' });
        nextLayer.style.transform = 'translateX(100%)';
        return;
      }

      if (isAnimating) return;
      isAnimating = true;
      const curEl  = document.getElementById(getLayerId(activeCanvas));
      const nextEl = document.getElementById(getLayerId(getOther(activeCanvas)));
      nextEl.style.transition = 'none';
      nextEl.style.transform  = direction === 'left' ? 'translateX(100%)' : 'translateX(-100%)';
      void nextEl.offsetWidth;
      const ease = 'cubic-bezier(0.4,0,0.2,1)';
      curEl.style.transition  = 'transform 380ms ' + ease;
      nextEl.style.transition = 'transform 380ms ' + ease;
      curEl.style.transform   = direction === 'left' ? 'translateX(-100%)' : 'translateX(100%)';
      nextEl.style.transform  = 'translateX(0)';
      setTimeout(() => {
        activeCanvas = getOther(activeCanvas);
        curEl.style.transition = 'none';
        curEl.style.transform  = 'translateX(100%)';
        isAnimating = false;
      }, 390);
    });
  });
}

function navPage(delta) {
  if (isAnimating || !pdfDoc) return;
  const t = currentPage + delta;
  if (t < 1 || t > totalPages) return;
  currentPage = t;
  renderPage(currentPage, delta > 0 ? 'left' : 'right');
}

function goToPage(n) {
  if (isAnimating || !pdfDoc || n === currentPage) return;
  const dir = n > currentPage ? 'left' : 'right';
  currentPage = Math.max(1, Math.min(n, totalPages));
  renderPage(currentPage, dir);
}

function updateCounter(n) {
  document.getElementById('cur-page').textContent = n;
  document.getElementById('fs-cur').textContent   = n;
}

function updateButtons(n) {
  const first = n <= 1, last = n >= totalPages;
  ['btn-prev','btn-first','fs-prev','fs-first'].forEach(id => { const el = document.getElementById(id); if (el) el.disabled = first; });
  ['btn-next','btn-last', 'fs-next','fs-last' ].forEach(id => { const el = document.getElementById(id); if (el) el.disabled = last;  });
  const cp = document.getElementById('click-prev');
  const cn = document.getElementById('click-next');
  if (cp) { cp.style.opacity = first ? '0' : ''; cp.style.pointerEvents = first ? 'none' : ''; }
  if (cn) { cn.style.opacity = last  ? '0' : ''; cn.style.pointerEvents = last  ? 'none' : ''; }
}

// ── Fullscreen
function openFullscreen() {
  if (!pdfDoc) return;
  const overlay = document.getElementById('fullscreen-overlay');
  overlay.classList.add('open');
  document.getElementById('fs-tot').textContent = totalPages;
  renderFullscreenPage(currentPage);
  if (overlay.requestFullscreen) overlay.requestFullscreen().catch(() => {});
}

function closeFullscreen() {
  document.getElementById('fullscreen-overlay').classList.remove('open');
  if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
}

function fsNavPage(delta) {
  if (!pdfDoc) return;
  let t;
  if      (delta >=  999) t = totalPages;
  else if (delta <= -999) t = 1;
  else                    t = currentPage + delta;
  if (t < 1 || t > totalPages) return;
  currentPage = t;
  updateCounter(currentPage);
  updateButtons(currentPage);
  renderFullscreenPage(currentPage);
}

function renderFullscreenPage(pageNum) {
  if (!pdfDoc) return;
  pdfDoc.getPage(pageNum).then(page => {
    const fsCvs  = document.getElementById('fs-canvas');
    const fsWrap = document.getElementById('fs-canvas-wrap');
    const nVp    = page.getViewport({ scale: 1 });
    const fsBase = Math.min(
      (fsWrap.clientWidth  * 0.97) / nVp.width,
      (fsWrap.clientHeight * 0.97) / nVp.height
    );
    const renderScale = fsBase * DPR * RENDER_BOOST;
    const vp = page.getViewport({ scale: renderScale });
    fsCvs.width        = vp.width;
    fsCvs.height       = vp.height;
    fsCvs.style.width  = (nVp.width  * fsBase) + 'px';
    fsCvs.style.height = (nVp.height * fsBase) + 'px';
    const ctx = fsCvs.getContext('2d', { alpha: false });
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    page.render({ canvasContext: ctx, viewport: vp, intent: 'display' });
  });
}

// Close fullscreen on backdrop click
document.getElementById('fs-canvas-wrap').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeFullscreen();
});

// Fullscreen swipe
let fsTouchX = 0;
document.getElementById('fs-canvas-wrap').addEventListener('touchstart', e => { fsTouchX = e.touches[0].clientX; }, { passive: true });
document.getElementById('fs-canvas-wrap').addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - fsTouchX;
  if (Math.abs(dx) > 40) fsNavPage(dx < 0 ? 1 : -1);
}, { passive: true });

window.addEventListener('resize', () => {
  if (pdfDoc) renderPage(currentPage, 'none');
  if (document.getElementById('fullscreen-overlay').classList.contains('open')) renderFullscreenPage(currentPage);
});
</script>
